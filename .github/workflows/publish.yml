name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.17.3)"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Build + release notes from the TAGGED commit, not the branch HEAD
          # a workflow_dispatch selected — otherwise a manual re-publish can
          # ship a wheel / notes that do not match the tag (#107).
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/research-pipeline
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-github:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Build + release notes from the TAGGED commit, not the branch HEAD
          # a workflow_dispatch selected — otherwise a manual re-publish can
          # ship a wheel / notes that do not match the tag (#107).
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create or update GitHub Release with built artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          echo "Releasing tag: $TAG"

          # Extract this tag's section from CHANGELOG.md (between its heading
          # and the next "## [" heading). Fall back to auto-generated notes.
          awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" { flag = 1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > notes.md || true

          if [ ! -s notes.md ]; then
            echo "No CHANGELOG section for $TAG; using auto-generated notes."
            NOTES_FLAG="--generate-notes"
          else
            NOTES_FLAG="--notes-file notes.md"
          fi

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading artifacts."
            gh release upload "$TAG" dist/* --repo "$REPO" --clobber
          else
            echo "Creating release $TAG."
            gh release create "$TAG" dist/* \
              --repo "$REPO" \
              --title "$TAG" \
              $NOTES_FLAG
          fi
