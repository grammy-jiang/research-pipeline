# Daily AI Intelligence — Source Registry
#
# Phase A access methods only (rss_atom, github_releases, html_scrape, manual).
# The pipeline polls only what's listed here. Per-source `max_events_per_run`
# and the global ranker (max_items=30) keep the daily brief inside its
# 80-link / 400-6000 word governance budget — large enough for ~15-20 minutes
# of focused morning reading.

[briefing]
watchlist_terms = [
  "agent",
  "coding agent",
  "MCP",
  "tool use",
  "reasoning",
  "RAG",
  "evaluation",
  "fine-tuning",
  "quantization",
  "inference",
  "context window",
  "multimodal",
  "Copilot",
  "Claude Code"
]
max_sources_per_run = 100

[[briefing.sources]]
source_id = "anthropic-news"
source_name = "Anthropic Research"
source_class = "primary_artifact"
access_method = "html_scrape"
official_url = "https://www.anthropic.com/research"
