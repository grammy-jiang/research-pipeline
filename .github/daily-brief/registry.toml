# Daily AI Intelligence — Source Registry
#
# Phase A access methods only (rss_atom, github_releases, manual). The pipeline
# polls only what's listed here. Per-source `max_events_per_run` and the
# global ranker (max_items=10, min_rank_score=4.0) keep the daily brief inside
# its 15-link / 900-1400 word governance budget.

[briefing]
watchlist_terms = [
  "agent",
  "coding agent",
  "MCP",
  "tool use",
  "reasoning",
  "RAG",
  "evaluation",
  "fine-tuning",
  "quantization",
  "inference",
  "context window",
  "multimodal",
  "Copilot",
  "Claude Code"
]
max_sources_per_run = 30

[[briefing.sources]]
source_id = "anthropic-news"
source_name = "Anthropic Research"
source_class = "primary_artifact"
access_method = "html_scrape"
official_url = "https://www.anthropic.com/research"
feed_url = "https://www.anthropic.com/research"
link_path_prefix = "/research/"
cadence = "daily"
retention_policy = "metadata_only"
allowed_raw_storage = true
trust_weight = 1.5
noise_weight = 0.0
max_events_per_run = 3
tags = ["vendor", "frontier-lab"]

