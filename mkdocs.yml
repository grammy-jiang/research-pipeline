site_name: research-pipeline
site_url: https://grammy-jiang.github.io/research-pipeline/
site_description: >-
  A deterministic, stage-based Python pipeline for searching, screening,
  downloading, converting, and summarizing academic papers.
repo_url: https://github.com/grammy-jiang/research-pipeline
repo_name: grammy-jiang/research-pipeline

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - User Guide: user-guide.md
  - Architecture: architecture.md
  - Python Development: python development.md
  - Implementation Plan: implementation-plan.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - attr_list
  - md_in_html
