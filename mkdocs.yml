site_name: research-pipeline
site_url: https://grammy-jiang.github.io/research-pipeline/
site_description: >-
  A deterministic, stage-based Python pipeline for searching, screening,
  downloading, converting, and summarizing academic papers — plus a daily
  AI intelligence briefing system.
repo_url: https://github.com/grammy-jiang/research-pipeline
repo_name: grammy-jiang/research-pipeline

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - User Manual: user-manual.md
  - Reference:
    - API Reference: api-reference.md
    - Configuration: user-guide.md
    - Data Model: data-model.md
  - Architecture:
    - System Design: system-design.md
    - Security Model: security-model.md
    - ADRs:
      - Overview: adr/README.md
      - ADR-001 uv build tool: adr/ADR-001-uv-build-tool.md
      - ADR-002 Pydantic models: adr/ADR-002-pydantic-domain-models.md
      - ADR-003 Stage-based pipeline: adr/ADR-003-stage-based-pipeline.md
      - ADR-004 Conversion registry: adr/ADR-004-conversion-backend-registry.md
      - ADR-005 SQLite state: adr/ADR-005-sqlite-persistent-state.md
      - ADR-006 FastMCP server: adr/ADR-006-fastmcp-server.md
      - ADR-007 Multi-tier memory: adr/ADR-007-multi-tier-memory.md
      - ADR-008 Dual pipelines: adr/ADR-008-briefing-vs-academic-pipeline.md
  - Development:
    - Developer Guide: developer-guide.md
    - Testing Strategy: testing-strategy.md
    - Operations Runbook: operations-runbook.md
  - Changelog: changelog.md

# Keep the search plugin + build from indexing material that isn't part of the
# shipped manual (#115): the _archive/ of old phase specs, and local research /
# reference scratch (the "A Philosophy of Software Design" copies, subagent
# design notes, conversion scripts, and image dumps).
exclude_docs: |
  _archive/
  *.pdf
  *.epub
  *.py
  pdf-images/
  epub-images/
  epub-docling/
  ousterhout-docling.md/
  ousterhout-*.md
  *Ousterhout*.md
  *Philosophy of Software Design*.md
  dokumen.pub_*.md
  aposd*.md
  Designing *.md
  Neutral Reusable*.md
  Portable Source*.md
  Technical-Source*.md
  subagent-*.md
  blueprint-skill-*.md
  skills-improvement-*.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - attr_list
  - md_in_html
