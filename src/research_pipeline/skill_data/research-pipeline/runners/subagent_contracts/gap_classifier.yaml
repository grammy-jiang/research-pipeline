# gap_classifier subagent contract
# Task: classify-gaps (gap_classifier)
# Executor kind: llm_worker

role: gap_classifier
task_id: classify-gaps

description: |
  Classify the open gaps from the synthesis report as ACADEMIC, ENGINEERING, or OUT_OF_SCOPE.
  For ACADEMIC gaps, propose a concrete arXiv search query to close them.
  For ENGINEERING gaps, document how to resolve them (API references, benchmarks, code repos).
  For OUT_OF_SCOPE gaps, explain why they fall outside the research topic.

inputs:
  - path: "{run_dir}/summarize/synthesis_report.json"
    description: "Primary: Synthesis report from the summarize stage (standard + deep profiles)"
    optional: false
  - path: "{run_dir}/analysis/synthesis.json"
    description: "Alternative: Richer synthesis from paper-synthesizer (deep profile only, may not exist)"
    optional: true
  - path: "{skill_dir}/schemas/gap_classification.schema.json"
    description: "Output schema"

instructions: |
  1. First check if {run_dir}/summarize/synthesis_report.json exists — use it as the
     primary source for open_gaps.
  2. If {run_dir}/analysis/synthesis.json also exists (deep profile), merge any additional
     gaps from it that are not already present.
  3. {run_dir} = {cwd}/runs/{run_id}
  4. Populate the `convergence` object: set `should_continue: true` with reason
     `open_gaps_remain` if any ACADEMIC gaps remain and the current round is below
     `max_rounds`; otherwise set `should_continue: false` with the appropriate reason
     (`no_open_gaps`, `round_cap_reached`, `no_new_papers`, or `user_marked_out_of_scope`).

outputs:
  - path: "{cwd}/gaps.json"
    description: "Classified gaps with search queries"
    schema: "../../schemas/gap_classification.schema.json"

allowed_tools:
  - view
  - grep

forbidden_actions:
  - Do NOT re-synthesize or summarize papers
  - Do NOT call search tools (only classify; searches run in next round)
  - Do NOT write outside the run workspace

classification_criteria:
  ACADEMIC: |
    The gap requires additional academic literature:
    - No existing papers in the current synthesis address it
    - Needs new papers from arXiv/S2/OpenAlex to resolve
  ENGINEERING: |
    The gap can be resolved by:
    - Reading project documentation or API references
    - Reviewing benchmark code or datasets
    - Checking GitHub repos of cited papers
  OUT_OF_SCOPE: |
    The gap is outside the research topic:
    - Unrelated to the core research question
    - Would require a separate, independent investigation
    - Explicitly excluded by the topic definition

output_schema:
  # Must validate against schemas/gap_classification.schema.json
  run_id:       str       # pipeline run ID
  round:        int       # current round number (1–4)
  topic:        str       # optional: research topic
  gaps:
    - id:                     str   # unique gap identifier
      description:            str   # clear description of the gap
      classification:         ACADEMIC | ENGINEERING | OUT_OF_SCOPE
      priority:               HIGH | MEDIUM | LOW  # optional
      suggested_search_query: str   # ACADEMIC only — single arXiv search query
      resolution_notes:       str   # ENGINEERING only — how to resolve the gap
  convergence:
    should_continue:  bool  # true if any ACADEMIC gaps remain and round < max_rounds
    reason:           open_gaps_remain | no_open_gaps | round_cap_reached | no_new_papers | user_marked_out_of_scope
    next_round_topic: str   # optional — topic for next round if should_continue is true

completion_criteria:
  - "{cwd}/gaps.json exists and validates against schemas/gap_classification.schema.json"
  - "Every gap has required fields: id, description, classification"
  - "ACADEMIC gaps include at least one suggested_search_query"
  - "ENGINEERING gaps include at least one resolution_notes entry documenting how to resolve the gap"
  - "convergence object is present with should_continue (bool) and reason"

self_reporting_forbidden: true
status_update: |
  After classification:
  1. Verify gaps.json exists and all gaps are classified
  2. Do NOT mark task accepted
  3. Re-run runner.py — it will validate and accept
