# synthesis_reviewer subagent contract
# Task: review-synthesis (synthesis_reviewer)
# Executor kind: llm_reviewer

role: synthesis_reviewer
task_id: review-synthesis

description: |
  Independently review the synthesis report produced by the paper_synthesizer.
  The reviewer must evaluate faithfulness, coherence, and gap completeness.
  The reviewer has NO write access to the synthesis files.

inputs:
  - path: "{run_dir}/analysis/synthesis.json"
    description: "Synthesis report to review"
  - path: "{run_dir}/analysis/synthesis.md"
    description: "Human-readable synthesis narrative"
  - path: "{run_dir}/analysis/"
    description: "Per-paper analysis files — ground truth for faithfulness checks"
  - path: "{skill_dir}/schemas/reviewer_result.schema.json"
    description: "Schema for the verdict file to produce"

outputs:
  - path: "{run_dir}/review/synthesis_review.json"
    description: "Verdict file"
    schema: "../../schemas/reviewer_result.schema.json"

allowed_tools:
  - view       # read-only access to synthesis and analysis files
  - grep
  - glob

forbidden_actions:
  - Do NOT edit synthesis.json or synthesis.md
  - Do NOT edit any analysis file
  - Do NOT accept or reject the task yourself — only write the verdict file
  - Do NOT call any MCP tool that modifies pipeline state

review_dimensions:
  faithfulness:
    description: "Every claim in the synthesis is traceable to at least one analysis file"
    verdict_field: "faithfulness"    # float 0–1; stored in scores.faithfulness
  coherence:
    description: "The synthesis narrative is internally consistent; no contradiction is overlooked"
    verdict_field: "coherence"       # float 0–1; stored in scores.coherence
  gap_completeness:
    description: "All open gaps are classified and no obvious gap is missing"
    verdict_field: "gap_completeness"  # float 0–1; stored in scores.gap_completeness
  citation_integrity:
    description: "All paper_id references in the synthesis match papers in screened.jsonl"
    verdict_field: "citation_integrity"  # bool; stored in scores.citation_integrity

verdict_schema:
  # Required fields (must match reviewer_result.schema.json)
  reviewer_task_id: "review-synthesis"
  target_artifact:  "{run_dir}/analysis/synthesis.json"
  status:           "accepted | rejected | accepted_with_issues"
  # Optional fields (all additional properties are allowed by the schema)
  issues:           list[str]   # specific issues found (replaces deprecated findings)
  required_fixes:   list[str]   # if status = rejected
  confidence:       float       # reviewer confidence in verdict (0–1)
  notes:            str         # free-text notes
  scores:                       # additional dimension scores (not in base schema)
    faithfulness:       float   # 0–1
    coherence:          float   # 0–1
    gap_completeness:   float   # 0–1
    citation_integrity: bool

pass_threshold:
  faithfulness:     0.75
  coherence:        0.70
  gap_completeness: 0.60

rejection_triggers:
  - "scores.faithfulness < 0.75"
  - "scores.citation_integrity = false"
  - "Any required synthesis section is empty"

completion_criteria:
  - "{run_dir}/review/synthesis_review.json exists"
  - "status is 'accepted', 'rejected', or 'accepted_with_issues'"
  - "All score fields present"

self_reporting_forbidden: true
note: |
  The reviewer ONLY writes synthesis_review.json. After writing the file, do NOT
  mark the task accepted yourself. Re-run runner.py — it will validate the artifact
  and accept the task. If status is 'rejected', the orchestrating agent must reset
  the 'report' and 'review-synthesis' tasks to 'pending' in workflow_state.json
  before re-running runner.py.
